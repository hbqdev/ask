name: CI

on:
  push:
    branches: [dev, main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun lint
      - run: bun typecheck
      - run: bun format:check
      - run: bun run test
      # The build only needs DATABASE_URL to exist (import-time check); it
      # never connects. A placeholder keeps secrets out of CI.
      - run: bun run build
        env:
          DATABASE_URL: postgresql://placeholder:placeholder@localhost:5432/placeholder
