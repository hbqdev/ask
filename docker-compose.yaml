name: ask-stack

services:
  ask:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ask
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-morphic}:${POSTGRES_PASSWORD:-morphic}@postgres:5432/${POSTGRES_DB:-morphic}
      DATABASE_RESTRICTED_URL: postgresql://${POSTGRES_USER:-morphic}:${POSTGRES_PASSWORD:-morphic}@postgres:5432/${POSTGRES_DB:-morphic}
      DATABASE_SSL_DISABLED: 'true'
      ENABLE_AUTH: 'true'
      MORPHIC_CLOUD_DEPLOYMENT: 'false'
      LOCAL_REDIS_URL: redis://redis:6379
    ports:
      - "${HOST_PORT:-3738}:3000"
    volumes:
      - uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: ask-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-morphic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-morphic}
      POSTGRES_DB: ${POSTGRES_DB:-morphic}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-morphic}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: ask-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

volumes:
  postgres_data:
    name: ask-postgres-data
  redis_data:
    name: ask-redis-data
  uploads:
    name: morphic-uploads
