name: ask-stack

services:
  ask:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ask
    env_file: .env
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-morphic}:${POSTGRES_PASSWORD:-morphic}@postgres:5432/${POSTGRES_DB:-morphic}
      DATABASE_RESTRICTED_URL: postgresql://${POSTGRES_USER:-morphic}:${POSTGRES_PASSWORD:-morphic}@postgres:5432/${POSTGRES_DB:-morphic}
      DATABASE_SSL_DISABLED: 'true'
      ENABLE_AUTH: 'true'
      MORPHIC_CLOUD_DEPLOYMENT: 'false'
      LOCAL_REDIS_URL: redis://redis:6379
    ports:
      - '${HOST_PORT:-3738}:3000'
    volumes:
      - uploads:/app/uploads
      - model-cache:/app/model-cache
    networks:
      # shared-infra is joined so the fetch rescue chain can reach the
      # flaresolverr and crawl4ai containers (both loopback-bound on the
      # host, so only reachable container-to-container). See
      # lib/utils/flaresolverr.ts.
      - default
      - shared-infra
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      searxng:
        condition: service_started
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg17
    container_name: ask-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-morphic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-morphic}
      POSTGRES_DB: ${POSTGRES_DB:-morphic}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-morphic}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: ask-redis
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    restart: unless-stopped

  # Locally-bundled SearXNG instance, used as an automatic failover target
  # when the primary instance (SEARXNG_API_URL, typically an existing
  # external SearXNG deployment) is unreachable. See SEARXNG_FALLBACK_API_URL
  # in .env and lib/utils/searxng-client.ts for the failover logic. Not
  # exposed to the host — only reachable from the `ask` container.
  searxng:
    image: searxng/searxng
    container_name: ask-searxng
    environment:
      SEARXNG_SECRET: ${SEARXNG_SECRET}
    volumes:
      - ./searxng-limiter.toml:/etc/searxng/limiter.toml
      - ./searxng-settings.yml:/etc/searxng/settings.yml
      - searxng_data:/data
    restart: unless-stopped

networks:
  shared-infra:
    name: shared-infra
    external: true

volumes:
  postgres_data:
    name: ask-postgres-data
  redis_data:
    name: ask-redis-data
  uploads:
    name: morphic-uploads
  model-cache:
    name: ask-model-cache
  searxng_data:
    name: ask-searxng-data
